services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: orkystra
      POSTGRES_USER: orkystra
      POSTGRES_PASSWORD: orkystra
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  qdrant:
    image: qdrant/qdrant:v1.15.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  api:
    build:
      context: ..
      dockerfile: backend/src/Orkystra.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Security__ApiKey: orkystra-dev-local-key
      TenantAccess__DefaultTenantId: north-hub-demo
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - mqtt
      - qdrant

  ai-service:
    build:
      context: ..
      dockerfile: python-services/ai-service/Dockerfile
    ports:
      - "8001:8001"

  optimization-service:
    build:
      context: ..
      dockerfile: python-services/optimization-service/Dockerfile
    ports:
      - "8002:8002"

  web:
    build:
      context: ..
      dockerfile: frontend/web/Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - api

volumes:
  postgres-data:
  qdrant-data:
