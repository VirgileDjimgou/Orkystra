services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: orkystra
      POSTGRES_USER: orkystra
      POSTGRES_PASSWORD: orkystra
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  qdrant:
    image: qdrant/qdrant:v1.15.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  postgres-data:
  qdrant-data:
