name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore FleetOps.slnx
      - run: dotnet format FleetOps.slnx --verify-no-changes
      - run: dotnet build FleetOps.slnx --no-restore -c Release
      - run: dotnet test FleetOps.slnx --no-build -c Release --filter "Category!=SqlServer"
      - run: dotnet test tests/backend/FleetOps.UnitTests/FleetOps.UnitTests.csproj --no-build -c Release --filter "Category=SqlServer"
      - run: dotnet list FleetOps.slnx package --vulnerable --include-transitive

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - run: npm audit --omit=dev
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android-driver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Android SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.1" "platform-tools"
      - name: Android build
        run: |
          chmod +x ./gradlew
          ./gradlew lintDebug testDebugUnitTest assembleDebug assembleDebugAndroidTest
