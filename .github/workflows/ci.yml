name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/web/package-lock.json

      - name: Backend restore
        run: dotnet restore backend/Orkystra.slnx

      - name: Backend build
        run: dotnet build backend/Orkystra.slnx --configuration Release --no-restore

      - name: Backend tests
        run: dotnet test backend/Orkystra.slnx --configuration Release --no-build

      - name: Frontend install
        working-directory: frontend/web
        run: npm ci

      - name: Frontend build
        working-directory: frontend/web
        run: npm run build

      - name: Python compile check
        run: python -m compileall python-services
