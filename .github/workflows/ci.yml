name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore FleetOps.slnx
      - run: dotnet build FleetOps.slnx --no-restore -c Release
      - run: dotnet test FleetOps.slnx --no-build -c Release

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run build

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android-driver
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Android SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.1" "platform-tools"
      - name: Android build
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest assembleDebug
